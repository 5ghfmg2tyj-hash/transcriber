<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13131f"/>
      <stop offset="100%" stop-color="#09090f"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Microphone body -->
  <rect x="211" y="96" width="90" height="170" rx="45" fill="url(#acc)"/>

  <!-- Microphone arc stand -->
  <path d="M 152 262 Q 152 368 256 368 Q 360 368 360 262"
        stroke="url(#acc)" stroke-width="26" fill="none" stroke-linecap="round"/>

  <!-- Stand stem -->
  <line x1="256" y1="368" x2="256" y2="418"
        stroke="url(#acc)" stroke-width="26" stroke-linecap="round"/>

  <!-- Stand base -->
  <line x1="186" y1="418" x2="326" y2="418"
        stroke="url(#acc)" stroke-width="26" stroke-linecap="round"/>

  <!-- Sound wave left inner -->
  <path d="M 116 220 Q 100 256 116 292"
        stroke="#6366f1" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Sound wave left outer -->
  <path d="M 80 196 Q 54 256 80 316"
        stroke="#6366f1" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Sound wave right inner -->
  <path d="M 396 220 Q 412 256 396 292"
        stroke="#6366f1" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Sound wave right outer -->
  <path d="M 432 196 Q 458 256 432 316"
        stroke="#6366f1" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
